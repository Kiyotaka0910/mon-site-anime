<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tier List - Personnages d'Animés</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- STYLES SPÉCIFIQUES ET MODERNISATION --- */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        .tierlist-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        /* Bouton Retour ultra-stylisé */
        .back-button {
            display: inline-flex;
            align-items: center;
            margin-bottom: 25px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: #ff4757;
            border-color: #ff4757;
            transform: translateX(-5px);
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        /* Titres */
        .tierlist-container h2 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 5px;
            color: #ffffff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .tierlist-container p {
            color: #a4b0be;
            margin-bottom: 30px;
            font-size: 1rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* Tableau de la Tier List */
        .tier-table {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(20, 22, 33, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 10px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .tier-row {
            display: flex;
            min-height: 95px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: background 0.3s ease;
        }

        .tier-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Étiquettes de rangs avec lettres blanches et dégradés profonds */
        .tier-label {
            width: 95px;
            min-width: 95px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        /* Couleurs modernes en dégradé */
        .tier-s { background: linear-gradient(135deg, #ff4757, #ff6b81); }
        .tier-a { background: linear-gradient(135deg, #ff7f50, #ffa502); }
        .tier-b { background: linear-gradient(135deg, #ffa801, #ffd32a); }
        .tier-c { background: linear-gradient(135deg, #fed330, #ffee55); color: #1e272e; text-shadow: none; }
        .tier-d { background: linear-gradient(135deg, #2ed573, #7bed9f); color: #1e272e; text-shadow: none; }

        /* Zone de dépôt */
        .tier-zone {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            align-content: center;
            gap: 8px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
        }

        /* Zone de réserve des personnages (Style Translucide) */
        .character-bank {
            margin-top: 40px;
            background: rgba(22, 24, 34, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .character-bank h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #ffffff;
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }

        .bank-zone {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            min-height: 120px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.2);
        }

        /* Style Premium des images de personnages */
        .character {
            width: 75px;
            height: 75px;
            border-radius: 10px;
            cursor: grab;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        border-color 0.2s ease, 
                        box-shadow 0.2s ease;
        }

        .character:hover {
            transform: scale(1.08);
            border-color: #ff4757;
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.4);
        }

        .character:active {
            cursor: grabbing;
        }

        /* Effet visuel pendant qu'on glisse le perso */
        .character.dragging {
            opacity: 0.4;
            transform: scale(0.9);
            border-color: #2e90ff;
            box-shadow: 0 0 15px rgba(46, 144, 255, 0.6);
        }
    </style>
</head>

        const bankZone = document.getElementById('bankZone');
        const totalCharacters = 501; // Changé à 501 pour inclure Guts !
        const imageExtension = 'jpg'; 

        // Génération automatique des 501 emplacements avec les vrais noms couplés !
        for (let i = 1; i <= totalCharacters; i++) {
            const img = document.createElement('img');
            img.src = `images/${i}.${imageExtension}`; 
            img.id = `perso-${i}`;
            img.className = 'character';
            
            // Attribution dynamique du vrai nom du personnage pour l'accessibilité et le survol
            const nomPerso = nomsPersonnages[i] || `Personnage ${i}`;
            img.title = nomPerso;
            img.alt = nomPerso; 
            
            img.setAttribute('draggable', 'true');
            
            img.addEventListener('dragstart', drag);
            img.addEventListener('dragend', dragEnd); 
            
            bankZone.appendChild(img);
        }

        // --- FONCTIONS DE DRAG & DROP ---
        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
            ev.target.classList.add('dragging');
        }

        function dragEnd(ev) {
            ev.target.classList.remove('dragging');
        }

        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const draggedElement = document.getElementById(data);
            
            if (draggedElement) {
                draggedElement.classList.remove('dragging');
            }

            let targetZone = ev.target;
            
            // Si on lâche sur une image existante, on cible son conteneur parent
            if (targetZone.classList.contains('character')) {
                targetZone = targetZone.parentElement;
            }

            // On vérifie que c'est une zone valide avant d'insérer
            if (targetZone.classList.contains('tier-zone') || targetZone.classList.contains('bank-zone')) {
                targetZone.appendChild(draggedElement);
            }
        }
    </script>

</body>
