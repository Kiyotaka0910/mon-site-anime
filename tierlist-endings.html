<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tier List - Endings d'Animés (50)</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- STYLES SPÉCIFIQUES ET MODERNISATION --- */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f111a;
            color: white;
        }

        .tierlist-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        /* Bouton Retour ultra-stylisé */
        .back-button {
            display: inline-flex;
            align-items: center;
            margin-bottom: 25px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: #2e90ff; /* Couleur bleutée pour différencier des openings */
            border-color: #2e90ff;
            transform: translateX(-5px);
            box-shadow: 0 4px 15px rgba(46, 144, 255, 0.4);
        }

        /* Titres */
        .tierlist-container h2 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 5px;
            color: #ffffff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .tierlist-container p {
            color: #a4b0be;
            margin-bottom: 30px;
            font-size: 1rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* Tableau de la Tier List */
        .tier-table {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(20, 22, 33, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 10px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .tier-row {
            display: flex;
            min-height: 95px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: background 0.3s ease;
        }

        .tier-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Étiquettes de rangs */
        .tier-label {
            width: 95px;
            min-width: 95px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .tier-s { background: linear-gradient(135deg, #ff4757, #ff6b81); }
        .tier-a { background: linear-gradient(135deg, #ff7f50, #ffa502); }
        .tier-b { background: linear-gradient(135deg, #ffa801, #ffd32a); }
        .tier-c { background: linear-gradient(135deg, #fed330, #ffee55); color: #1e272e; text-shadow: none; }
        .tier-d { background: linear-gradient(135deg, #2ed573, #7bed9f); color: #1e272e; text-shadow: none; }

        /* Zone de dépôt */
        .tier-zone {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            align-content: center;
            gap: 8px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
        }

        /* Zone de réserve des endings */
        .character-bank {
            margin-top: 40px;
            background: rgba(22, 24, 34, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .character-bank h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #ffffff;
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }

        .bank-zone {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            min-height: 120px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.2);
        }

        /* Style des jaquettes d'endings */
        .character {
            width: 75px;
            height: 75px;
            border-radius: 10px;
            cursor: grab;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        border-color 0.2s ease, 
                        box-shadow 0.2s ease;
        }

        .character:hover {
            transform: scale(1.08);
            border-color: #2e90ff; /* Bleu au survol pour les endings */
            box-shadow: 0 8px 20px rgba(46, 144, 255, 0.4);
        }

        /* Effet d'animation quand la musique joue sur cet ending */
        .character.playing {
            border-color: #2ed573;
            box-shadow: 0 0 15px rgba(46, 213, 115, 0.8);
            animation: pulse-green 1.5s infinite ease-in-out;
        }

        @keyframes pulse-green {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }

        .character:active {
            cursor: grabbing;
        }

        .character.dragging {
            opacity: 0.4;
            transform: scale(0.9);
            border-color: #ff4757;
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.6);
        }
    </style>
</head>
<body>

    <div class="tierlist-container">
        <a href="index.html" class="back-button">← Retour à l'accueil</a>
        
        <h2>Classe tes Endings préférés</h2>
        <p>Glisse les jaquettes dans les catégories. <strong>Clique sur une image pour écouter/mettre en pause l'ending !</strong></p>

        <div class="tier-table">
            <div class="tier-row">
                <div class="tier-label tier-s">S</div>
                <div class="tier-zone" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label tier-a">A</div>
                <div class="tier-zone" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label tier-b">B</div>
                <div class="tier-zone" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label tier-c">C</div>
                <div class="tier-zone" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label tier-d">D</div>
                <div class="tier-zone" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
            </div>
        </div>

        <div class="character-bank">
            <h3>Endings disponibles (50)</h3>
            <div class="bank-zone" id="bankZone" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
        </div>
    </div>

    <script>
        // --- BASE DE DONNÉES DES ENDINGS ---
        // Tu peux modifier ces titres avec ceux de tes vrais endings !
       const nomsEndings = {
    1: "Jujutsu Kaisen ED 1 - Lost in Paradise (ALI)",
    2: "Shingeki no Kyojin ED 7 - Akuma no Ko (Higuchi Ai)",
    3: "Hunter x Hunter ED 5 - Hyori Ittai (Yuzu)",
    4: "Hunter x Hunter ED 2 - Hunting for Your Dream (Galneryus)",
    5: "Chainsaw Man ED 3 - Hawatari Nioku Centi (Maximum the Hormone)",
    6: "Demon Slayer ED 1 - from the edge (LiSA)",
    7: "Demon Slayer ED 2 - Asa ga Kuru (Aimer)",
    8: "Naruto ED 1 - Wind (Akeboshi)",
    9: "Naruto Shippuden ED 1 - Shooting Star (HOME MADE Kazoku)",
    10: "Naruto Shippuden ED 15 - U can do it! (DOMINO)",
    11: "Death Note ED 1 - Alumina (Nightmare)",
    12: "Death Note ED 2 - Zetsubou Billy (Maximum the Hormone)",
    13: "Fullmetal Alchemist: Brotherhood ED 1 - Uso (SID)",
    14: "Fullmetal Alchemist: Brotherhood ED 4 - Shunkan Sentimental",
    15: "One Piece ED 1 - Memories (Maki Otsuki)",
    16: "Bleach ED 1 - Life is Like a Boat (Rie fu)",
    17: "Bleach ED 3 - Houkiboshi (Younha)",
    18: "My Hero Academia ED 3 - Datte Atashi no Hero (LiSA)",
    19: "My Hero Academia ED 6 - Shout Baby",
    20: "Spy x Family ED 1 - Comedy (Gen Hoshino)",
    21: "Kaguya-sama: Love is War ED 2 - Chika Dance",
    22: "JoJo's Bizarre Adventure ED 1 - Roundabout (Yes)",
    23: "Dragon Ball Z ED 1 - Detekoi Tobikiri ZENKAI Power!",
    24: "Dragon Ball Super ED 10 - 70cm Square no Mado",
    25: "Black Clover ED 1 - Aoi Honoo",
    26: "Tokyo Ghoul ED 1 - Kisetsu wa TsugiTsugi Shindeiku",
    27: "Mob Psycho 100 ED 1 - Refrain Boy",
    28: "Classroom of the Elite S1 ED - Beautiful Soldier (Minami)",
    29: "Classroom of the Elite S2 ED - Hito Suki (Mai Fuchigami)",
    30: "Classroom of the Elite S3 ED - Chosai Koreso (Yui Ninomiya)",
    31: "Vinland Saga ED 1 - Torches (Aimer)",
    32: "Fire Force ED 1 - veil (Keina Suda)",
    33: "Code Geass ED 1 - Mokuteki (FLOW)",
    34: "Assassination Classroom ED 1 - Hello, shooting-star",
    35: "Haikyu!! ED 1 - Leo (Tacica)",
    36: "Haikyu!! ED 2 - Ah Yeah!! (Sukima Switch)",
    37: "Re:Zero ED 1 - STYX HELIX (MYTH & ROID)",
    38: "Solo Leveling ED 1 - request (krage)",
    39: "Naruto ED 2 - Harmonia (RYTHEM)",
    40: "Naruto Shippuden ED 28 - Rainbow (ALTIMA)",
    41: "One Piece ED 15 - Eternal Pose",
    42: "Bleach ED 29 - Reepoipaa",
    43: "Demon Slayer S3 ED - Koi Kogare (milet x MAN WITH A MISSION)",
    44: "Shingeki no Kyojin ED 1 - Utsukushiki Zankoku na Sekai",
    45: "Chainsaw Man ED 8 - First Death (TK)",
    46: "Jujutsu Kaisen S2 ED 1 - Akari (Soushi Sakiyama)",
    47: "Spy x Family ED 2 - SOUVENIR / Shikaku Unmei",
    48: "Kuroko no Basket ED 1 - Start it right away",
    49: "Blue Lock ED 1 - Natsu Yoru no Hanabi",
    50: "Dragon Ball Super ED 3 - Usubeni"
};

        const bankZone = document.getElementById('bankZone');
        const totalEndings = 50; // Nombre total d'endings à afficher
        const imageExtension = 'jpg'; 
        
        let currentAudio = null;
        let currentPlayingImg = null;
        let isDragging = false;

        // Génération automatique des jaquettes
        for (let i = 1; i <= totalEndings; i++) {
            const img = document.createElement('img');
            
            // Le chemin cherche dans ton nouveau dossier "images/endings/"
            img.src = `images/endings/${i}.${imageExtension}`; 
            img.id = `ending-${i}`;
            img.className = 'character';
            
            const nomEd = nomsEndings[i] || `Ending ${i}`;
            img.title = nomEd;
            img.alt = nomEd; 
            img.setAttribute('draggable', 'true');
            
            img.addEventListener('dragstart', drag);
            img.addEventListener('dragend', dragEnd); 
            
            img.addEventListener('click', function() {
                if (!isDragging) {
                    gererAudio(i, img);
                }
            });
            
            bankZone.appendChild(img);
        }

        // --- GESTION DE L'AUDIO ---
        function gererAudio(id, imgElement) {
            // Le chemin cherche le MP3 avec "ed" au début dans le dossier audio/
            // Exemple : audio/ed1.mp3, audio/ed2.mp3
            const audioSrc = `audio/ed${id}.mp3`;

            if (currentAudio && currentPlayingImg === imgElement) {
                if (!currentAudio.paused) {
                    currentAudio.pause();
                    imgElement.classList.remove('playing');
                } else {
                    currentAudio.play();
                    imgElement.classList.add('playing');
                }
                return;
            }

            if (currentAudio) {
                currentAudio.pause();
                if (currentPlayingImg) {
                    currentPlayingImg.classList.remove('playing');
                }
            }

            currentAudio = new Audio(audioSrc);
            currentPlayingImg = imgElement;
            
            currentAudio.play().then(() => {
                imgElement.classList.add('playing');
            }).catch(err => {
                console.error("Erreur audio : Fichier " + audioSrc + " introuvable.", err);
            });

            currentAudio.addEventListener('ended', function() {
                imgElement.classList.remove('playing');
                currentAudio = null;
                currentPlayingImg = null;
            });
        }

        // --- FONCTIONS DE DRAG & DROP ---
        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drag(ev) {
            isDragging = true;
            ev.dataTransfer.setData("text", ev.target.id);
            ev.target.classList.add('dragging');
        }

        function dragEnd(ev) {
            ev.target.classList.remove('dragging');
            setTimeout(() => {
                isDragging = false;
            }, 100);
        }

        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const draggedElement = document.getElementById(data);
            
            if (draggedElement) {
                draggedElement.classList.remove('dragging');
            }

            let targetZone = ev.target;
            
            if (targetZone.classList.contains('character')) {
                targetZone = targetZone.parentElement;
            }

            if (targetZone.classList.contains('tier-zone') || targetZone.classList.contains('bank-zone')) {
                targetZone.appendChild(draggedElement);
            }
        }
    </script>

</body>
</html>
